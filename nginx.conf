events {}

http {
    include /etc/nginx/mime.types;
     gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
    # rate limit
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        error_page 404 /404.html;
        # rate limit
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        # Security headers outside of location blocks to apply globally
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()";
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self';";

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Deny access to hidden files and sensitive config files
        location ~ /\. {
            deny all;
            return 404;
        }
        location ~* \.(env|git|yml|yaml|config)$ {
            deny all;
            return 404;
        }
        
        # HTML — always revalidate
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";

            # Security headers for HTML responses
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Permissions-Policy "geolocation=(), camera=(), microphone=()";
            add_header Content-Security-Policy
                "default-src 'self'; script-src 'self'; style-src 'self';";
        }

        # Fingerprinted assets — cache for 1 year
        location ~* \.(js|css|png|jpg|woff2|mp4)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";

            # Security headers for static assets
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Permissions-Policy "geolocation=(), camera=(), microphone=()";
            add_header Content-Security-Policy
                "default-src 'self'; script-src 'self'; style-src 'self';";
        }
    }
}